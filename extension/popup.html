<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 360px; padding: 0; margin: 0; font-family: system-ui; }
    .header { background: #1890ff; color: white; padding: 16px; }
    .header h1 { margin: 0; font-size: 16px; }
    .section { padding: 16px; border-bottom: 1px solid #f0f0f0; }
    .status { 
      padding: 8px 12px; 
      border-radius: 4px; 
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.active { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .status.inactive { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
    input { 
      width: 100%; 
      padding: 8px; 
      border: 1px solid #d9d9d9; 
      border-radius: 4px; 
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    button { 
      background: #1890ff; 
      color: white; 
      border: none; 
      padding: 8px 16px; 
      border-radius: 4px; 
      cursor: pointer; 
      width: 100%;
    }
    .help { font-size: 12px; color: #666; margin-top: 4px; }
    .app-list { max-height: 150px; overflow-y: auto; margin-top: 8px; }
    .app-item { 
      display: flex; 
      justify-content: space-between; 
      padding: 8px; 
      background: #f6ffed; 
      border-radius: 4px; 
      margin-bottom: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔐 TopIAM 智能代填</h1>
    <div style="margin-top:6px;font-size:12px;opacity:0.95;">
      - powered by <a href="https://github.com/dsyzayn/topiam-extension" target="_blank" rel="noopener noreferrer" style="color:#fff;text-decoration:underline;">Zayn</a>
    </div>
  </div>
  
  <div class="section">
    <div id="status" class="status inactive">
      状态: 等待配置
    </div>
    
    <label style="font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px;">
      TopIAM 域名（多个用逗号分隔）
    </label>
    <input type="text" id="domains" placeholder="sso.company.com, auth.company.com">
    <div class="help">插件将监控这些域名的表单代填跳转</div>
    
    <button id="saveBtn" style="margin-top: 8px;">保存配置</button>
    <button id="clearCacheBtn" style="margin-top: 8px; background: #ff7875;">清除插件缓存</button>

    <label style="display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;color:#333;">
      <input type="checkbox" id="debugPanelEnabled" style="width:auto;margin:0;">
      启用调试面板（仅 /portal/app）
    </label>
  </div>
  
  <div class="section">
    <div style="font-size: 13px; font-weight: 500; margin-bottom: 8px;">
      已知应用（自动发现）
    </div>
    <div id="appList" class="app-list">
      <div style="color: #999; font-size: 12px;">暂无，点击TopIAM应用后自动识别</div>
    </div>
  </div>
  
  <div class="section" style="background: #f6ffed;">
    <div style="font-size: 12px; color: #52c41a;">
      ✓ 插件已就绪<br>
      使用方式：正常点击TopIAM应用，插件自动接管
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
